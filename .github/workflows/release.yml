on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'debian/*' # Push events to matching debian/*, i.e. debian/1.0-2, debian/20.15.10, debian/23.20020326

name: Release Process

env:
  SOURCE_DIR: ./
  ARTIFACTS_DIR: debian/build/release/

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install needed packages
        run: |
          if [ $(dpkg -l | grep -c dpkg-dev) -ne 1 ]; then sudo apt-get update && sudo apt-get install -y dpkg-dev; fi
      - name: Gather changelog
        run: |
          ls -la
          dpkg-parsechangelog | tail -n +9 > debian.changelog
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: debian.changelog
          draft: false
          prerelease: false

  build:
    name: Build and upload packages
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Remove github artefacts
      run: |
        rm -rf .github*
    - name: Adjust distibution in changelog file
      run: |
        sed -i '0,/restricted/s//stable/' debian/changelog
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential debhelper devscripts
    - name: Build Debian package
      run: |
        dpkg-buildpackage -us -uc -b
        mkdir -p debian/build/release/
        mv ../*.deb debian/build/release/ || true
    - name: Upload Release Assets
      uses: softprops/action-gh-release@v2
      with:
        files: debian/build/release/*
