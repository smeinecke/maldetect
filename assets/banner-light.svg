<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 160" width="830" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="scan-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="830" height="160" fill="url(#bg)" rx="8"/>

  <!-- Top bar: magnifying glass + tagline -->
  <g transform="translate(40, 14)">
    <circle cx="16" cy="18" r="10" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.7"/>
    <line x1="23" y1="25" x2="30" y2="32" stroke="#16a34a" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="10" y1="15" x2="22" y2="15" stroke="#16a34a" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="19" x2="22" y2="19" stroke="#16a34a" stroke-width="1" opacity="0.6"/>
    <line x1="10" y1="23" x2="22" y2="23" stroke="#16a34a" stroke-width="1" opacity="0.5"/>
    <text x="44" y="28" fill="#64748b" font-family="ui-monospace,'Cascadia Code','Source Code Pro',Consolas,monospace" font-size="13">Multi-engine threat detection for Linux</text>
  </g>

  <!-- Threat name tickers (top right) -->
  <g font-family="ui-monospace,monospace" font-size="9" opacity="0.25">
    <text x="600" y="22" fill="#dc2626">&#x26a0; php.backdoor.shell.183</text>
    <text x="620" y="36" fill="#dc2626">&#x26a0; base64.inject.unclassed</text>
    <text x="640" y="50" fill="#dc2626">&#x26a0; perl.ircbot.gen.b</text>
  </g>

  <line x1="40" y1="58" x2="790" y2="58" stroke="#94a3b8" stroke-width="0.5" opacity="0.15"/>

  <!-- Scan activity chart -->
  <g transform="translate(40, 148)" filter="url(#glow)">
    <line x1="0" y1="0" x2="750" y2="0" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
    <polygon points="0,0 30,-5 60,-8 90,-12 120,-10 150,-15 180,-20 210,-18 240,-14 270,-22 300,-28 330,-35 360,-30 390,-25 420,-32 450,-40 480,-55 510,-48 540,-35 570,-28 600,-20 630,-15 670,-10 710,-6 750,0"
             fill="url(#scan-fill)"/>
    <polyline points="0,0 30,-5 60,-8 90,-12 120,-10 150,-15 180,-20 210,-18 240,-14 270,-22 300,-28 330,-35 360,-30 390,-25 420,-32 450,-40 480,-55 510,-48 540,-35 570,-28 600,-20 630,-15 670,-10 710,-6 750,0"
              fill="none" stroke="#16a34a" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="300" cy="-28" r="3" fill="#dc2626" opacity="0.9"/>
    <circle cx="300" cy="-28" r="6.5" fill="none" stroke="#dc2626" stroke-width="0.8" opacity="0.4"/>
    <circle cx="450" cy="-40" r="3" fill="#dc2626" opacity="0.9"/>
    <circle cx="450" cy="-40" r="6.5" fill="none" stroke="#dc2626" stroke-width="0.8" opacity="0.4"/>
    <circle cx="480" cy="-55" r="3" fill="#dc2626" opacity="0.9"/>
    <circle cx="480" cy="-55" r="6.5" fill="none" stroke="#dc2626" stroke-width="0.8" opacity="0.4"/>
    <line x1="0" y1="-65" x2="750" y2="-65" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.5"/>
    <text x="756" y="-61" fill="#dc2626" font-family="ui-monospace,monospace" font-size="9" font-weight="600" opacity="0.7">HITS</text>
  </g>
</svg>
