<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 160" width="830" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f0f4f8"/>
    </linearGradient>
    <linearGradient id="track" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feFlood flood-color="#16a34a" flood-opacity="0.25" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feFlood flood-color="#dc2626" flood-opacity="0.35" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="830" height="160" fill="url(#bg)" rx="6"/>

  <!-- Top: tagline -->
  <text x="40" y="30" fill="#334155" font-family="ui-monospace,'Cascadia Code','Source Code Pro',Consolas,monospace" font-size="13.5" letter-spacing="0.5">Multi-engine malware detection for Linux</text>

  <!-- Top right: faded sig tickers -->
  <g font-family="ui-monospace,monospace" font-size="8.5">
    <text x="578" y="20" fill="#dc2626" opacity="0.15">{HEX}php.backdoor.shell.183</text>
    <text x="596" y="31" fill="#dc2626" opacity="0.11">{MD5}base64.inject.unclassed</text>
    <text x="614" y="42" fill="#dc2626" opacity="0.08">{YARA}perl.ircbot.gen.b</text>
  </g>

  <!-- Thin divider -->
  <line x1="40" y1="46" x2="790" y2="46" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Pipeline region -->
  <g transform="translate(40, 56)">

    <!-- Stage headers -->
    <g font-family="ui-monospace,monospace" font-size="10" font-weight="600" letter-spacing="0.5">
      <text x="32" y="14" fill="#16a34a" opacity="0.65">MD5</text>
      <text x="165" y="14" fill="#16a34a" opacity="0.65">SHA256</text>
      <text x="320" y="14" fill="#16a34a" opacity="0.65">HEX</text>
      <text x="468" y="14" fill="#16a34a" opacity="0.65">YARA</text>
      <text x="618" y="14" fill="#16a34a" opacity="0.65">STRING</text>
    </g>

    <!-- Pipeline track -->
    <rect x="0" y="24" width="750" height="36" rx="5" fill="url(#track)"/>
    <rect x="0" y="24" width="750" height="36" rx="5" fill="none" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Stage separators -->
    <g stroke="#cbd5e1" stroke-width="1">
      <line x1="140" y1="24" x2="140" y2="60"/>
      <line x1="280" y1="24" x2="280" y2="60"/>
      <line x1="430" y1="24" x2="430" y2="60"/>
      <line x1="580" y1="24" x2="580" y2="60"/>
    </g>

    <!-- Clean file dots flowing through pipeline -->
    <g filter="url(#glow-green)">
      <!-- MD5 stage -->
      <circle cx="30" cy="42" r="3" fill="#16a34a" opacity="0.75"/>
      <circle cx="58" cy="42" r="3" fill="#16a34a" opacity="0.5"/>
      <circle cx="86" cy="42" r="3" fill="#16a34a" opacity="0.3"/>
      <circle cx="114" cy="42" r="3" fill="#16a34a" opacity="0.15"/>
      <!-- SHA256 stage -->
      <circle cx="164" cy="42" r="3" fill="#16a34a" opacity="0.65"/>
      <circle cx="196" cy="42" r="3" fill="#16a34a" opacity="0.4"/>
      <circle cx="228" cy="42" r="3" fill="#16a34a" opacity="0.2"/>
      <!-- HEX stage -->
      <circle cx="306" cy="42" r="3" fill="#16a34a" opacity="0.55"/>
      <circle cx="342" cy="42" r="3" fill="#16a34a" opacity="0.3"/>
      <circle cx="378" cy="42" r="3" fill="#16a34a" opacity="0.15"/>
      <!-- YARA stage -->
      <circle cx="458" cy="42" r="3" fill="#16a34a" opacity="0.45"/>
      <circle cx="498" cy="42" r="3" fill="#16a34a" opacity="0.25"/>
      <circle cx="538" cy="42" r="3" fill="#16a34a" opacity="0.1"/>
      <!-- STRING stage -->
      <circle cx="608" cy="42" r="3" fill="#16a34a" opacity="0.35"/>
      <circle cx="648" cy="42" r="3" fill="#16a34a" opacity="0.15"/>
    </g>

    <!-- Threat hits — red with glow -->
    <g filter="url(#glow-red)">
      <circle cx="86" cy="42" r="4" fill="#dc2626"/>
      <circle cx="378" cy="42" r="4" fill="#dc2626"/>
      <circle cx="538" cy="42" r="4" fill="#dc2626"/>
    </g>

    <!-- Hit action labels below pipeline -->
    <g font-family="ui-monospace,monospace" font-size="9" fill="#dc2626" opacity="0.5">
      <line x1="86" y1="60" x2="86" y2="70" stroke="#dc2626" stroke-width="0.8" opacity="0.3"/>
      <text x="66" y="82" text-anchor="start">quarantine</text>

      <line x1="378" y1="60" x2="378" y2="70" stroke="#dc2626" stroke-width="0.8" opacity="0.3"/>
      <text x="367" y="82" text-anchor="start">clean</text>

      <line x1="538" y1="60" x2="538" y2="70" stroke="#dc2626" stroke-width="0.8" opacity="0.3"/>
      <text x="518" y="82" text-anchor="start">quarantine</text>
    </g>

    <!-- Summary -->
    <g font-family="ui-monospace,monospace" font-size="9">
      <text x="695" y="76" fill="#16a34a" opacity="0.45">1,247 clean</text>
      <text x="695" y="88" fill="#dc2626" opacity="0.45">3 hits</text>
    </g>
  </g>
</svg>
